<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Election Results Map</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
    }

    /* =========================================================
       MAP CONTAINER — adjust height to suit your embed
    ========================================================= */
    #map-container {
      position: relative;
      width: 100%;
      height: 560px;
    }

    #map {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: calc(100% - 280px);
      transition: width 0.2s ease;
    }

    /* =========================================================
       SIDE PANEL
       FIX 1: visibility:hidden by default — no flash on mobile.
       FIX 2: max-height not height:100%, so panel hugs content
               and anchors top-right regardless of map height.
    ========================================================= */
    #side-panel {
      position: absolute;
      top: 0; right: 0;
      width: 280px;
      max-height: 100%;
      background: #ffffff;
      border-left: 1px solid #e5e5e5;
      border-bottom: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      visibility: hidden; /* revealed by JS once layout is confirmed */
    }

    #side-panel.is-visible { visibility: visible; }

    .panel-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 10px;
      color: #bbb;
      font-size: 13px;
      text-align: center;
    }

    .panel-placeholder svg { opacity: 0.3; }

    /* =========================================================
       FIX 3: RESULT BAR
       Replaces old text result-label.
       Narrow left block = incumbent/previous party colour.
       Wide fill = winning party colour with text label.
    ========================================================= */
    .result-bar {
      display: flex;
      align-items: stretch;
      height: 32px;
      flex-shrink: 0;
    }

    .result-bar-incumbent {
      width: 10px;
      flex-shrink: 0;
    }

    .result-bar-fill {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .result-bar-text {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
    }

    .panel-header {
      padding: 10px 10px 8px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .ward-name {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      line-height: 1.2;
    }

    .council-name {
      font-size: 12px;
      color: #777;
      margin-top: 3px;
    }

    .panel-body {
      padding: 10px 10px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    /* =========================================================
       STACKED COMPARISON BARS
    ========================================================= */
    .stacked-section { margin-bottom: 12px; }

    .stacked-label {
      font-size: 10px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .stacked-bar {
      display: flex;
      width: 100%;
      height: 15px;
      border-radius: 0px;
      overflow: hidden;
      margin-bottom: 2px;
    }

    .stacked-bar.previous {
      height: 5px;
      opacity: 0.65;
      margin-bottom: 0;
    }

    .stacked-gap { height: 6px; }

    /* =========================================================
       RESULTS TABLE
    ========================================================= */
    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: fixed;
    }

    .results-table thead th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      font-weight: 400;
      padding: 0 3px 7px;
    }

    .results-table thead th:first-child { text-align: left; width: 95px; padding-left: 0; }
    .results-table thead th:nth-child(2) { text-align: right; width: 38px; }
    .results-table thead th:nth-child(4) { text-align: right; width: 44px; }

    .results-table tbody tr { border-top: 1px solid #f5f5f5; }
    .results-table tbody td { padding: 0px 3px; vertical-align: middle; }

    .party-cell { display: flex; align-items: center; }
    .party-stripe { width: 3px; height: 21px; flex-shrink: 0; }
    .party-name { font-size: 12px; font-weight: 400; color: #111; padding-left: 8px; }

    .pct-cell {
      text-align: right;
      font-size: 12px;
      font-weight: 400;
      color: #111;
      font-variant-numeric: tabular-nums;
    }

    .bar-cell { padding: 0 4px; }
    .bar-track { height: 15px; background: #f0f0f0; border-radius: 0px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 0px; }

    .chg-cell {
      text-align: right;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .chg-pos { color: #059669; }
    .chg-neg { color: #DC2626; }
    .chg-nil { color: #bbb; }

    /* =========================================================
       STATS GRID
    ========================================================= */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .stat-box { background: #f8f8f7; border-radius: 6px; padding: 8px 10px; }
    .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .stat-value { font-size: 14px; font-weight: 600; color: #111; }

    /* =========================================================
       FIX 6: PIN INDICATOR
       Small floating chip showing which ward is locked.
       Clicking it unpins.
    ========================================================= */
    #pin-indicator {
      position: absolute;
      top: 10px; left: 50px; /* sits beside the zoom controls */
      z-index: 15;
      background: rgba(255,255,255,0.94);
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 5px 12px 5px 8px;
      font-size: 11px;
      color: #333;
      display: none;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
      user-select: none;
    }

    #pin-indicator.active { display: flex; }
    #pin-indicator:hover { background: #f0f0f0; }

    /* =========================================================
       BOTTOM DRAWER (mobile)
       FIX 1: display:none by default — completely absent on
               desktop. JS adds .drawer-enabled on narrow layouts.
    ========================================================= */
    #drawer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: #ffffff;
      border-top: 1px solid #e5e5e5;
      border-radius: 0px 0px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      display: none;
    }

    #drawer.drawer-enabled { display: block; }

    #drawer-handle {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 10px;
      cursor: pointer;
      gap: 5px;
    }

    #drawer-pip { width: 36px; height: 4px; border-radius: 2px; background: #ddd; }

    #drawer-peek {
      display: flex;
      align-items: stretch;
      height: 55px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    #drawer-toggle {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      padding: 3px 10px;
      cursor: pointer;
      background: rgba(0,0,0,0.15);
      white-space: nowrap;
    }

    #drawer-toggle:hover { background: rgba(0,0,0,0.25); }

    #drawer-body {
      padding: 0 16px 24px;
      overflow-y: auto;
      max-height: 55vh;
      display: none;
    }

    /* =========================================================
       ATTRIBUTION
    ========================================================= */
    .map-credit { font-size: 11px; color: #aaa; text-align: center; padding: 6px 0 10px; }
    .map-credit a { color: #aaa; }

    /* =========================================================
       CONTROL BAR — sits above the map, outside the container.
       Search left, view controls right.
    ========================================================= */
    #control-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      background: #f0ede8;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
    }

    /* On very narrow screens, stack controls below search */
    @media (max-width: 480px) {
      #control-bar { gap: 8px; }
      #view-controls { width: 100%; }
      #search-wrap { max-width: 100%; }
    }


    /* =========================================================
       VIEW CONTROLS
       Floating control bar for switching map mode.
    ========================================================= */
    #view-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .vc-label {
      color: #999;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .vc-seg {
      display: flex;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }

    .vc-btn {
      padding: 3px 10px;
      font-size: 11px;
      font-family: inherit;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #555;
      transition: background 0.15s, color 0.15s;
    }

    .vc-btn:hover { background: #f5f5f5; }
    .vc-btn.active { background: #222; color: #fff; }

    #party-select-wrap {
      display: none;
      align-items: center;
      gap: 6px;
    }

    #party-select-wrap.visible { display: flex; }

    #party-select {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 3px 8px;
      font-size: 11px;
      font-family: inherit;
      background: #fff;
      color: #333;
      cursor: pointer;
      outline: none;
    }

    /* =========================================================
       CHOROPLETH LEGEND
       Bottom-left of the map. Gradient strip + labels.
    ========================================================= */
    #choropleth-legend {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 15;
      background: rgba(255,255,255,0.94);
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
      display: none;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
    }

    #choropleth-legend.visible { display: flex; }

    #legend-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 2px;
    }

    #legend-gradient {
      height: 10px;
      border-radius: 3px;
      width: 100%;
    }

    #legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #666;
      font-variant-numeric: tabular-nums;
    }

    /* =========================================================
       SEARCH BAR
       Floats top-centre of the map container.
       Compact on desktop, full-width on narrow.
    ========================================================= */
    #search-wrap {
      flex: 1;
      min-width: 160px;
      max-width: 320px;
      position: relative; /* for dropdown positioning */
    }

    #search-input {
      width: 100%;
      padding: 7px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      outline: none;
      color: #222;
    }

    #search-input:focus {
      border-color: #aaa;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
    }

    #search-input::placeholder { color: #bbb; }

    #search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      max-height: 220px;
      overflow-y: auto;
      display: none;
      z-index: 100;
    }

    #search-results.open { display: block; }

    .search-result-item {
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #f8f8f7; }

    .search-result-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .search-result-text { flex: 1; min-width: 0; }
    .search-result-ward { font-size: 13px; font-weight: 500; color: #111; }
    .search-result-council { font-size: 11px; color: #888; }

    .search-no-results {
      padding: 12px 14px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }

    /* =========================================================
       HISTORY TABLE
    ========================================================= */
    .history-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      table-layout: auto;
    }

    .history-table thead th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      font-weight: 400;
      padding: 0 4px 6px;
      text-align: right;
      white-space: nowrap;
    }

    .history-table thead th:first-child {
      text-align: left;
      padding-left: 0;
    }

    .history-table tbody tr { border-top: 1px solid #f5f5f5; }

    .history-table tbody td {
      padding: 3px 4px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #111;
      white-space: nowrap;
    }

    .history-table tbody td:first-child {
      text-align: left;
      padding-left: 0;
    }

    .history-party-cell {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .history-swatch {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .history-null { color: #ccc; }

    .demo-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
    .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
    .demo-item { background: #f8f8f7; border-radius: 6px; padding: 7px 9px; }
    .demo-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .demo-bar-track { height: 4px; background: #e8e8e8; border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
    .demo-bar-fill { height: 100%; border-radius: 2px; }
    .demo-value { font-size: 13px; font-weight: 600; color: #111; }
    .demo-nat { font-size: 10px; color: #bbb; font-weight: 400; }
  </style>

  
</head>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">

<!-- CONTROL BAR — outside and above the map -->
<div id="control-bar">
  <!-- Search: left side -->
  <div id="search-wrap">
    <input id="search-input" type="search" placeholder="Search ward or council…" autocomplete="off" aria-label="Search wards">
    <div id="search-results" role="listbox"></div>
  </div>

  <!-- View controls: right side -->
  <div id="view-controls">
    <span class="vc-label">View</span>
    <div class="vc-seg">
      <button class="vc-btn active" data-mode="winner">Winner</button>
      <button class="vc-btn" data-mode="share">Share</button>
    </div>
    <div id="party-select-wrap">
      <span class="vc-label">Party</span>
      <select id="party-select"></select>
    </div>
  </div>
</div>

<div id="map-container">
  <div id="map"></div>

  <!-- SIDE PANEL -->
  <div id="side-panel">
    <div class="panel-placeholder" id="panel-placeholder">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      <span>Hover a ward to see its result</span>
    </div>
    <div id="panel-inner" style="display:none;">
      <!-- FIX 3: result bar — incumbent stripe left, winner fill right -->
      <div class="result-bar">
        <div class="result-bar-incumbent" id="result-bar-incumbent"></div>
        <div class="result-bar-fill" id="result-bar-fill">
          <span class="result-bar-text" id="result-bar-text"></span>
        </div>
      </div>
      <div class="panel-header" id="panel-header"></div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>



  <!-- CHOROPLETH LEGEND — stays inside map, bottom-left -->
  <div id="choropleth-legend">
    <div id="legend-title">Vote share</div>
    <div id="legend-gradient"></div>
    <div id="legend-labels">
      <span>0%</span>
      <span id="legend-max"></span>
    </div>
  </div>

  <!-- FIX 6: PIN INDICATOR -->
  <div id="pin-indicator" role="button" aria-label="Unpin ward" title="Click to unpin">
    <span id="pin-dot" style="width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>
    <span id="pin-name"></span>
    <span style="color:#bbb;">✕</span>
  </div>

  <!-- BOTTOM DRAWER (mobile) -->
  <div id="drawer">
    <div id="drawer-handle" role="button" aria-label="Toggle result drawer">
      <div id="drawer-pip"></div>
    </div>
    <!-- Peek = result bar style: incumbent stripe | winner fill | toggle -->
    <div id="drawer-peek">
      <div id="drawer-peek-incumbent" style="width:8px;flex-shrink:0;align-self:stretch;"></div>
      <div id="drawer-peek-fill" style="flex:1;display:flex;align-items:center;padding:0 10px;gap:8px;min-width:0;">
        <div style="flex:1;min-width:0;">
          <div id="drawer-peek-label" style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#fff;line-height:1;margin-bottom:3px;"></div>
          <div id="drawer-peek-name" style="font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        </div>
        <button id="drawer-toggle">Details</button>
      </div>
    </div>
    <div id="drawer-body"></div>
  </div>
</div>

</p>

function rand(a, b) {
  return a + Math.random() * (b - a);
}
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function makeDemoResult(winner) {
  const others = Object.keys(PARTIES).filter((p) => p !== winner);
  const sh = { [winner]: rand(34, 54) };
  others.forEach((p, i) => {
    sh[p] =
      i === 0
        ? rand(16, Math.min(30, sh[winner] - 8))
        : i === 1
          ? rand(5, 13)
          : rand(1, 6);
  });
  const tot = Object.values(sh).reduce((a, c) => a + c, 0);
  Object.keys(sh).forEach((p) => (sh[p] = (sh[p] / tot) * 100));
  return sh;
}

function buildDemoData() {
  const data = {};
  DEMO_BOROUGHS.forEach((b) => {
    const w = DEMO_BIAS[b.name] || pick(Object.keys(PARTIES));
    const curr = makeDemoResult(w);
    const prevW =
      Math.random() < 0.8
        ? w
        : pick(Object.keys(PARTIES).filter((p) => p !== w));
    const prev = makeDemoResult(prevW);
    const sorted = Object.entries(curr).sort((a, b) => b[1] - a[1]);
    const swing = rand(-6, 6);
    data[b.name] = {
      ward_name: b.name,
      council: b.council,
      winner: w,
      prev_winner: prevW,
      curr,
      prev,
      sorted,
      swing,
      swing_dir: swing > 0 ? w : sorted[1][0],
      turnout: rand(32, 68).toFixed(1),
      electorate: Math.floor(rand(6000, 18000)),
      majority: Math.floor(rand(200, 4000)),
    };
  });
  return data;
}

// ============================================================
// CSV PARSING — RFC 4180-compliant, handles quoted fields
// containing commas, newlines, and escaped quotes ("")
// ============================================================
function parseCSVLine(line) {
  const fields = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') {
        cur += '"'; i++; // escaped quote
      } else if (ch === '"') {
        inQuotes = false;
      } else {
        cur += ch;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === ',') {
        fields.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
  }
  fields.push(cur.trim());
  return fields;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1)
    .filter(l => l.trim())
    .map((line) => {
      const vals = parseCSVLine(line);
      const row = {};
      headers.forEach((h, i) => (row[h] = vals[i] ?? ''));
      return row;
    });
}

function buildDataFromCSV(rows) {
  const data = {};
  rows.forEach((row) => {
    const code = row.ward_code;
    if (!code) return;
    const curr = {
      Lab: parseFloat(row.lab_pct) || 0,
      Con: parseFloat(row.con_pct) || 0,
      LDem: parseFloat(row.ld_pct) || 0,
      Grn: parseFloat(row.grn_pct) || 0,
      Ref: parseFloat(row.ref_pct) || 0,
      Ind: parseFloat(row.ind_pct) || 0,
      Oth: parseFloat(row.oth_pct) || 0,
    };
    const prev = {
      Lab: parseFloat(row.lab_prev) || 0,
      Con: parseFloat(row.con_prev) || 0,
      LDem: parseFloat(row.ld_prev) || 0,
      Grn: parseFloat(row.grn_prev) || 0,
      Ref: parseFloat(row.ref_prev) || 0,
      Ind: parseFloat(row.ind_prev) || 0,
      Oth: parseFloat(row.oth_prev) || 0,
    };
    const sorted = Object.entries(curr)
      .filter(([, v]) => v > 0)
      .sort((a, b) => b[1] - a[1]);
    const swing = parseFloat(row.swing) || 0;
    data[code] = {
      ward_code: code,
      ward_name: row.ward_name || code,
      council: row.council || '',
      is_new: row.is_new === '1' || row.is_new?.toLowerCase() === 'true' || row.is_new?.toLowerCase() === 'yes',
      winner: row.winner || sorted[0]?.[0] || 'Ind',
      prev_winner: row.prev_winner || '',
      curr,
      prev,
      sorted,
      swing,
      swing_dir: row.swing_dir || '',
      turnout: parseFloat(row.turnout) || 0,
      electorate: parseInt(row.electorate) || 0,
      majority: parseInt(row.majority) || 0,
    };
  });
  return data;
}

// ============================================================
// HISTORY DATA — flat CSV keyed by ward_code
// ============================================================
function buildHistoryFromCSV(rows) {
  // Returns { ward_code: [ {year, con, lab, ld, ref, grn, snp, pc, ind, oth}, … ] }
  const history = {};
  rows.forEach(row => {
    const code = row.ward_code;
    const year = parseInt(row.year);
    if (!code || !year) return;
    if (!history[code]) history[code] = [];
    history[code].push({
      year,
      con:  parseFloat(row.con_pct)    || null,
      lab:  parseFloat(row.lab_pct)    || null,
      ld:   parseFloat(row.ld_pct)     || null,
      ref:  parseFloat(row.reform_pct) || null,
      grn:  parseFloat(row.grn_pct)    || null,
      snp:  parseFloat(row.snp_pct)    || null,
      pc:   parseFloat(row.pc_pct)     || null,
      ind:  parseFloat(row.ind_pct)    || null,
      oth:  parseFloat(row.oth_pct)    || null,
    });
  });
  // Sort each ward's rows chronologically
  Object.values(history).forEach(arr => arr.sort((a, b) => a.year - b.year));
  return history;
}

// Keys present in each history row (excluding year)
const HISTORY_KEYS = ['con','lab','ld','ref','grn','snp','pc','ind','oth'];

// Map history key → party colour and base label
const HISTORY_PARTY_META = {
  con: { color: '#05718F',  label: 'Con'  },
  lab: { color: '#D34C4C',  label: 'Lab'  },
  ld:  { color: '#EBB82F',  label: 'LDem' },
  ref: { color: '#15B6C2',  label: 'Ref'  },
  grn: { color: '#5CBC4A',  label: 'Grn'  },
  snp: { color: '#005EB8',  label: 'SNP'  },
  pc:  { color: '#005EB8',  label: 'PC'   },
  ind: { color: '#CCA7C6',  label: 'Ind'  },
  oth: { color: '#BBBBBB',  label: 'Oth'  },
};

function getNatKey(wardRows) {
  // Returns 'snp', 'pc', or null; if both present returns 'snp' labelled 'Nat'
  const hasSNP = wardRows.some(r => r.snp > 0);
  const hasPC  = wardRows.some(r => r.pc  > 0);
  if (hasSNP && hasPC) return { key: 'snp', label: 'Nat' };
  if (hasSNP)          return { key: 'snp', label: 'SNP' };
  if (hasPC)           return { key: 'pc',  label: 'PC'  };
  return null;
}

function getHistoryRowValue(row, key) {
  return row[key];
}

function hexToRgbaHistory(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildHistoryTable(wardRows) {
  if (!wardRows || wardRows.length === 0) return '';

  const years = wardRows.map(r => r.year);
  const rowByYear = {};
  wardRows.forEach(r => rowByYear[r.year] = r);

  // Determine winner per year
  function getWinner(row) {
    let best = null, bestVal = -1;
    // Check all keys including nat consolidation
    const natInfo = getNatKey(wardRows);
    const keysToCheck = HISTORY_KEYS.filter(k => {
      if (k === 'snp' || k === 'pc') return false; // handled via nat
      return true;
    });
    if (natInfo) keysToCheck.push('_nat');

    keysToCheck.forEach(k => {
      const v = k === '_nat'
        ? ((row.snp || 0) + (row.pc || 0)) || null
        : row[k];
      if (v != null && v > bestVal) { bestVal = v; best = k; }
    });
    return best;
  }

  const winners = {};
  years.forEach(y => winners[y] = getWinner(rowByYear[y]));

  // Build the canonical key list for display, excluding snp/pc (replaced by nat)
  const natInfo = getNatKey(wardRows);
  const baseKeys = ['con','lab','ld','ref','grn','ind','oth'];
  const displayKeys = natInfo ? [...baseKeys.slice(0,4), '_nat', ...baseKeys.slice(4)] : baseKeys;
  // _nat is virtual — it represents whichever nat column has data

  function getDisplayValue(row, dkey) {
    if (dkey === '_nat') {
      const v = (row.snp || 0) + (row.pc || 0);
      return v > 0 ? v : null;
    }
    return row[dkey];
  }

  function getDisplayMeta(dkey) {
    if (dkey === '_nat') {
      const base = natInfo.key === 'snp'
        ? HISTORY_PARTY_META.snp
        : HISTORY_PARTY_META.pc;
      return { color: base.color, label: natInfo.label };
    }
    return HISTORY_PARTY_META[dkey];
  }

  // Filter to rows that have at least one non-null value across all years
  const activeKeys = displayKeys.filter(dkey =>
    years.some(y => {
      const v = getDisplayValue(rowByYear[y], dkey);
      return v != null && v > 0;
    })
  );

  // Sort by most recent year's value descending
  const latestRow = rowByYear[years[years.length - 1]];
  activeKeys.sort((a, b) => {
    const va = getDisplayValue(latestRow, a) || 0;
    const vb = getDisplayValue(latestRow, b) || 0;
    return vb - va;
  });

  // Build table HTML
  let html = `<div class="history-section">
    <div class="stacked-label">Vote share by year</div>
    <table class="history-table">
      <thead><tr><th>Party</th>`;
  years.forEach(y => { html += `<th>${y}</th>`; });
  html += `</tr></thead><tbody>`;

  activeKeys.forEach(dkey => {
    const meta = getDisplayMeta(dkey);
    html += `<tr><td><div class="history-party-cell">
      <span class="history-swatch" style="background:${meta.color};"></span>
      ${meta.label}
    </div></td>`;

    years.forEach(y => {
      const row = rowByYear[y];
      const v = getDisplayValue(row, dkey);
      const isWin = winners[y] === dkey;
      const bg = isWin ? `background:${hexToRgbaHistory(meta.color, 0.13)};` : '';
      const fw = isWin ? 'font-weight:600;' : '';

      if (v == null || v === 0) {
        html += `<td class="history-null" style="${bg}">—</td>`;
      } else {
        html += `<td style="${bg}${fw}">${v.toFixed(1)}%</td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}


function chgClass(v) {
  return v > 0 ? 'chg-pos' : v < 0 ? 'chg-neg' : 'chg-nil';
}
function chgStr(v) {
  const s = Math.abs(parseFloat(v)).toFixed(1);
  return v > 0 ? `+${s}` : v < 0 ? `\u2212${s}` : '\u2014';
}

// Fixed left-to-right ideological order for stacked bars.
// Edit this to change order or add parties. Unlisted parties append at the right.
const PARTY_ORDER = [
  'Grn',
  'Lab',
  'LD',
  'Nat',
  'PC',
  'SNP',
  'Oth',
  'Ind',
  'Con',
  'Ref',
];

function stackedBarHTML(shares, cls) {
  const listed = PARTY_ORDER.filter((p) => (shares[p] || 0) > 0);
  const unlisted = Object.keys(shares).filter(
    (p) => !PARTY_ORDER.includes(p) && (shares[p] || 0) > 0,
  );
  const order = [...listed, ...unlisted];
  return `<div class="stacked-bar ${cls}">${order
    .map((p) => {
      const s = shares[p] || 0;
      const color = PARTIES[p]?.color || '#ccc';
      return `<div style="width:${s.toFixed(2)}%;background:${color};height:100%;"></div>`;
    })
    .join('')}</div>`;
}

// FIX 3: update the result bar strip at top of panel
function updateResultBar(d) {
  const winner = PARTIES[d.winner] || PARTIES.Ind;
  const incumbent = PARTIES[d.prev_winner] || winner;
  const held = d.winner === d.prev_winner;
  const label = held
    ? `${winner.label} hold`
    : `${winner.label} gain from ${incumbent.label}`;
  document.getElementById('result-bar-incumbent').style.background =
    incumbent.color;
  document.getElementById('result-bar-fill').style.background = winner.color;
  document.getElementById('result-bar-text').textContent = label;
}

function buildPanelHeader(d) {
  return `<div class="ward-name">${d.ward_name}</div>
            <div class="council-name">${d.council}</div>`;
}

const DEMO_NATIONAL = {
  white_pct: 81.7, over55_pct: 34.2,
  professional_pct: 31.4, renting_pct: 35.2,
};
const DEMO_FIELDS = [
  { key: 'white_pct',        label: 'White',        color: '#94a3b8' },
  { key: 'over55_pct',       label: 'Over 55',      color: '#f59e0b' },
  { key: 'professional_pct', label: 'Professional', color: '#6366f1' },
  { key: 'renting_pct',      label: 'Renting',      color: '#10b981' },
];

function buildDemographicsHTML(wardCode) {
  if (!DEMOGRAPHICS || !DEMOGRAPHICS[wardCode]) return '';
  const d = DEMOGRAPHICS[wardCode];
  let items = '';
  DEMO_FIELDS.forEach(({ key, label, color }) => {
    const val = d[key];
    if (val == null) return;
    const nat = DEMO_NATIONAL[key];
    items += `<div class="demo-item">
      <div class="demo-label">${label}</div>
      <div class="demo-bar-track">
        <div class="demo-bar-fill" style="width:${Math.min(val,100)}%;background:${color};"></div>
      </div>
      <div class="demo-value">${val.toFixed(1)}%<span class="demo-nat"> nat. ${nat}%</span></div>
    </div>`;
  });
  if (!items) return '';
  return `<div class="demo-section">
    <div class="stacked-label">Demographics (2021 Census)</div>
    <div class="demo-grid">${items}</div>
  </div>`;
}

function buildPanelBody(d, HISTORY) {
  const historyRows = HISTORY ? HISTORY[d.ward_code] : null;
  const historyHTML = historyRows
    ? buildHistoryTable(historyRows)
    : '<p style="font-size:12px;color:#aaa;padding:8px 0;">No history data available.</p>';
  return historyHTML + buildDemographicsHTML(d.ward_code);
}

function showSidePanel(wardCode, DATA, HISTORY) {
  const d = DATA[wardCode];
  if (!d) return;
  document.getElementById('panel-placeholder').style.display = 'none';
  const inner = document.getElementById('panel-inner');
  inner.style.display = 'flex';
  inner.style.flexDirection = 'column';
  updateResultBar(d);
  document.getElementById('panel-header').innerHTML = buildPanelHeader(d);
  document.getElementById('panel-body').innerHTML = buildPanelBody(d, HISTORY);
}

let drawerExpanded = false;

function dismissDrawer() {
  document.getElementById('drawer').style.transform = 'translateY(100%)';
  drawerExpanded = false;
  document.getElementById('drawer-body').style.display = 'none';
  document.getElementById('drawer-toggle').textContent = 'More \u2191';
}

function showDrawer(wardCode, DATA, HISTORY) {
  const d = DATA[wardCode];
  if (!d) return;
  const winner    = PARTIES[d.winner]      || PARTIES.Ind;
  const incumbent = PARTIES[d.prev_winner] || winner;
  const held      = d.winner === d.prev_winner;

  // Peek = result bar: incumbent left stripe, winner fill, label + ward name
  document.getElementById('drawer-peek-incumbent').style.background = incumbent.color;
  document.getElementById('drawer-peek-fill').style.background      = winner.color;
  document.getElementById('drawer-peek-label').textContent = held
    ? `${winner.label} hold`
    : `${winner.label} gain from ${incumbent.label}`;
  document.getElementById('drawer-peek-name').textContent = d.ward_name;

  // Body: stacked bars + table only — no repeated header
  document.getElementById('drawer-body').innerHTML = buildPanelBody(d, HISTORY);

  drawerExpanded = false;
  document.getElementById('drawer-body').style.display  = 'none';
  document.getElementById('drawer-toggle').textContent  = 'Details \u2191';
  document.getElementById('drawer').style.transform     = 'translateY(0)';
}

document.getElementById('drawer-toggle').addEventListener('click', () => {
  drawerExpanded = !drawerExpanded;
  document.getElementById('drawer-body').style.display = drawerExpanded
    ? 'block'
    : 'none';
  document.getElementById('drawer-toggle').textContent = drawerExpanded
    ? 'Details \u2193'
    : 'Details \u2191';
});

document.getElementById('drawer-handle').addEventListener('click', () => {
  if (document.getElementById('drawer').style.transform === 'translateY(100%)')
    return;
  drawerExpanded = !drawerExpanded;
  document.getElementById('drawer-body').style.display = drawerExpanded
    ? 'block'
    : 'none';
  document.getElementById('drawer-toggle').textContent = drawerExpanded
    ? 'Details \u2193'
    : 'Details \u2191';
});

// ============================================================
// MAP STYLE
// ============================================================
// ============================================================
// MAP STYLE
// Loads your custom Maputnik style from style.json, then
// injects the ward data sources and layers on top.
//
// IMPORTANT: place style.json in the same folder as index.html.
// The ward layers (wards-fill, wards-line, wards-hover,
// wards-pinned) are appended last so they sit above the base map.
// ============================================================
function buildMapStyle(geojsonData, DATA) {

  // Build the winner colour-match expression
  const colorMatch = ['match', ['get', 'ward_code']];
  Object.entries(DATA).forEach(([code, d]) => {
    colorMatch.push(code, PARTIES[d.winner]?.color || '#888780');
  });
  colorMatch.push('#cccccc');

  // ── Base map style ──────────────────────────────────────────
  // Colours taken from your Maputnik design.
  // All source-layers use OpenFreeMap's schema.
  return {
    version: 8,
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      basemap: { type: 'vector', url: 'https://tiles.openfreemap.org/planet' },
      wards:   { type: 'geojson', data: geojsonData, generateId: true },
    },
    layers: [

      // Background land
      { id: 'bg', type: 'background',
        paint: { 'background-color': 'rgba(245, 242, 232, 1)' } },

      // Water
      { id: 'water', type: 'fill', source: 'basemap', 'source-layer': 'water',
        paint: { 'fill-color': 'hsl(205, 56%, 73%)', 'fill-opacity': 0.9 } },

      // Green spaces — grass, parks, wood, cemetery
      { id: 'landcover-green', type: 'fill', source: 'basemap', 'source-layer': 'landuse',
        filter: ['in', ['get', 'class'], ['literal', ['park','grass','cemetery','forest','meadow','nature_reserve']]],
        paint: { 'fill-color': 'hsl(82, 46%, 72%)', 'fill-opacity': 0.5 } },

      // Residential landuse tint
      { id: 'landuse-residential', type: 'fill', source: 'basemap', 'source-layer': 'landuse',
        filter: ['in', ['get', 'class'], ['literal', ['residential','suburb','neighbourhood']]],
        paint: { 'fill-color': 'rgba(222, 211, 190, 1)', 'fill-opacity': 0.45 } },

      // Roads — five tiers, muted warm palette
      { id: 'road-path', type: 'line', source: 'basemap', 'source-layer': 'transportation',
        filter: ['in', ['get', 'class'], ['literal', ['path','track','service']]],
        paint: { 'line-color': 'rgba(200,195,185,1)',
          'line-width': ['interpolate',['linear'],['zoom'], 13,0.4, 17,1.2] } },

      { id: 'road-minor', type: 'line', source: 'basemap', 'source-layer': 'transportation',
        filter: ['in', ['get', 'class'], ['literal', ['minor','residential']]],
        paint: { 'line-color': 'rgba(210,205,192,1)',
          'line-width': ['interpolate',['linear'],['zoom'], 11,0.4, 15,2] } },

      { id: 'road-secondary', type: 'line', source: 'basemap', 'source-layer': 'transportation',
        filter: ['in', ['get', 'class'], ['literal', ['secondary','tertiary']]],
        paint: { 'line-color': 'rgba(200,193,178,1)',
          'line-width': ['interpolate',['linear'],['zoom'], 9,0.5, 14,3] } },

      { id: 'road-primary', type: 'line', source: 'basemap', 'source-layer': 'transportation',
        filter: ['in', ['get', 'class'], ['literal', ['primary']]],
        paint: { 'line-color': 'rgba(188,178,160,1)',
          'line-width': ['interpolate',['linear'],['zoom'], 8,0.8, 14,4] } },

      { id: 'road-motorway', type: 'line', source: 'basemap', 'source-layer': 'transportation',
        filter: ['in', ['get', 'class'], ['literal', ['motorway','trunk']]],
        paint: { 'line-color': 'rgba(175,165,145,1)',
          'line-width': ['interpolate',['linear'],['zoom'], 6,1, 14,5] } },

      // Railway
      { id: 'railway', type: 'line', source: 'basemap', 'source-layer': 'transportation',
        filter: ['==', ['get', 'class'], 'rail'],
        paint: { 'line-color': 'hsl(34,12%,66%)', 'line-width': 1, 'line-opacity': 0.7 } },

      // Buildings — appear from zoom 12
      { id: 'buildings', type: 'fill', source: 'basemap', 'source-layer': 'building',
        minzoom: 12,
        paint: { 'fill-color': 'rgba(185, 176, 169, 1)', 'fill-opacity': 0.9,
          'fill-outline-color': 'rgba(165,156,148,1)' } },

      // Ward fills — election results
      { id: 'wards-fill', type: 'fill', source: 'wards',
        paint: { 'fill-color': colorMatch, 'fill-opacity': 0.55 } },

      { id: 'wards-line', type: 'line', source: 'wards',
        paint: { 'line-color': '#000000', 'line-width': 0.6, 'line-opacity': 0.4 } },

      // Hover highlight
      { id: 'wards-hover', type: 'fill', source: 'wards',
        paint: {
          'fill-color': colorMatch,
          'fill-opacity': ['case', ['boolean', ['feature-state','hover'], false], 0.25, 0],
        } },

      // Pinned ward outline
      { id: 'wards-pinned', type: 'line', source: 'wards',
        paint: {
          'line-color': '#111111', 'line-width': 1.5,
          'line-opacity': ['case', ['boolean', ['feature-state','pinned'], false], 1, 0],
        } },

      // Place labels — on top of everything
      { id: 'place-labels', type: 'symbol', source: 'basemap', 'source-layer': 'place',
        filter: ['in', ['get', 'class'], ['literal', ['city','town','suburb','village']]],
        layout: {
          'text-field': ['get', 'name'],
          'text-font': ['Noto Sans Regular'],
          'text-size': ['interpolate',['linear'],['zoom'], 9,10, 13,14],
          'text-anchor': 'center', 'text-max-width': 8,
        },
        paint: {
          'text-color': 'hsl(0,0%,25%)',
          'text-halo-color': 'hsla(0,0%,100%,0.85)',
          'text-halo-width': 2,
        } },
    ],
  };
}

// ============================================================
// MAP INITIALISATION
// ============================================================
function initMap(geojsonData, DATA, HISTORY) {
  const container = document.getElementById('map-container');
  const sidePanel = document.getElementById('side-panel');
  const drawer = document.getElementById('drawer');
  const pinEl = document.getElementById('pin-indicator');

  let isWide = false;
  let hoveredId = null;
  let pinnedId = null; // FIX 6: currently pinned feature id
  let pinnedCode = null;

  // FIX 6: unpin helper
  function unpin() {
    if (pinnedId !== null && window._electionMap) {
      window._electionMap.setFeatureState(
        { source: 'wards', id: pinnedId },
        { pinned: false },
      );
    }
    pinnedId = null;
    pinnedCode = null;
    pinEl.classList.remove('active');
  }

  // Clicking the pin chip unpins
  pinEl.addEventListener('click', unpin);

  // FIX 1 & 2: layout applied before map renders — no flash
  function applyLayout(wide) {
    isWide = wide;
    if (wide) {
      document.getElementById('map').style.width = 'calc(100% - 280px)';
      sidePanel.style.display = 'flex';
      sidePanel.classList.add('is-visible');
      drawer.classList.remove('drawer-enabled');
      dismissDrawer();
      unpin();
    } else {
      document.getElementById('map').style.width = '100%';
      sidePanel.style.display = 'none';
      sidePanel.classList.remove('is-visible');
      drawer.classList.add('drawer-enabled');
    }
    if (window._electionMap) window._electionMap.resize();
  }

  // Apply layout before map creation
  applyLayout(container.offsetWidth >= 660);

  window._electionMap = new maplibregl.Map({
    container: 'map',
    style: buildMapStyle(geojsonData, DATA),
    center: MAP_CENTER,
    zoom: MAP_ZOOM,
    attributionControl: false,
  });

  const map = window._electionMap;
  map.addControl(
    new maplibregl.NavigationControl({ showCompass: false }),
    'top-left',
  );
  map.addControl(
    new maplibregl.AttributionControl({ compact: true }),
    'bottom-left',
  );
  map.on('error', (e) => console.warn('MapLibre:', e.error?.message || e));

  map.on('load', () => {
    // Safe bounds fit — handles null geometries, avoids spread stack overflow
    const coords = geojsonData.features.flatMap((f) => {
      const geom = f.geometry;
      if (!geom) return [];
      if (geom.type === 'Polygon') return geom.coordinates[0];
      if (geom.type === 'MultiPolygon') return geom.coordinates.flat(2);
      return [];
    });
    if (coords.length) {
      const lngs = coords.map((c) => c[0]);
      const lats = coords.map((c) => c[1]);
      map.fitBounds(
        [
          [
            lngs.reduce((a, b) => Math.min(a, b)),
            lats.reduce((a, b) => Math.min(a, b)),
          ],
          [
            lngs.reduce((a, b) => Math.max(a, b)),
            lats.reduce((a, b) => Math.max(a, b)),
          ],
        ],
        { padding: 20, duration: 0 },
      );
    }

    // HOVER (desktop only, blocked when a ward is pinned)
    map.on('mousemove', 'wards-fill', (e) => {
      if (!isWide || pinnedId !== null) return;
      map.getCanvas().style.cursor = 'pointer';
      if (e.features.length > 0) {
        const fid = e.features[0].id;
        const code = e.features[0].properties.ward_code;
        if (hoveredId !== null && hoveredId !== fid) {
          map.setFeatureState(
            { source: 'wards', id: hoveredId },
            { hover: false },
          );
        }
        hoveredId = fid;
        map.setFeatureState(
          { source: 'wards', id: hoveredId },
          { hover: true },
        );
        showSidePanel(code, DATA, HISTORY);
      }
    });

    map.on('mouseleave', 'wards-fill', () => {
      if (!isWide || pinnedId !== null) return;
      map.getCanvas().style.cursor = '';
      if (hoveredId !== null) {
        map.setFeatureState(
          { source: 'wards', id: hoveredId },
          { hover: false },
        );
        hoveredId = null;
      }
    });

    // FIX 6: CLICK — pin the ward; clicking same ward or off unpins
    map.on('click', (e) => {
      const features = map.queryRenderedFeatures(e.point, {
        layers: ['wards-fill'],
      });

      // Clicked off wards — unpin
      if (features.length === 0) {
        unpin();
        return;
      }

      const fid = features[0].id;
      const code = features[0].properties.ward_code;
      const d = DATA[code];

      if (isWide) {
        // Toggle: clicking pinned ward unpins it
        if (pinnedId === fid) {
          unpin();
          return;
        }
        // Unpin previous, clear hover
        if (pinnedId !== null) {
          map.setFeatureState(
            { source: 'wards', id: pinnedId },
            { pinned: false },
          );
        }
        if (hoveredId !== null) {
          map.setFeatureState(
            { source: 'wards', id: hoveredId },
            { hover: false },
          );
          hoveredId = null;
        }
        // Pin new ward
        pinnedId = fid;
        pinnedCode = code;
        map.setFeatureState(
          { source: 'wards', id: pinnedId },
          { pinned: true },
        );
        showSidePanel(code, DATA, HISTORY);
        // Show pin chip
        if (d) {
          const p = PARTIES[d.winner] || PARTIES.Ind;
          document.getElementById('pin-dot').style.background = p.color;
          document.getElementById('pin-name').textContent = d.ward_name;
          pinEl.classList.add('active');
        }
      } else {
        showDrawer(code, DATA, HISTORY);
      }
    });
  });

  // Wire up search once map is available
  // isWideFn returns current isWide so search can pick panel vs drawer
  initSearch(DATA, geojsonData, map, () => isWide,
    (code, data) => showSidePanel(code, data, HISTORY),
    (code, data) => showDrawer(code, data, HISTORY)
  );
  initChoropleth(map, DATA);

  // Responsive observer — container width, not viewport
  const ro = new ResizeObserver((entries) => {
    const w = entries[0].contentRect.width;
    const nowWide = w >= 660;
    if (nowWide !== isWide) applyLayout(nowWide);
  });
  ro.observe(container);
}



// ============================================================
// CHOROPLETH ENGINE
// Fixed ceilings per party — honest comparable scale.
// ============================================================
const CHOROPLETH_CEILINGS = {
  Lab:  65, Con:  65, LDem: 50,
  Grn:  50, Ref:  50, Ind:  40, Oth: 30,
};
const CHOROPLETH_DEFAULT_CEILING = 50;

// The CSV column key for each party's current vote share
const PARTY_PCT_KEY = {
  Lab: 'lab_pct', Con: 'con_pct', LDem: 'ld_pct',
  Grn: 'grn_pct', Ref: 'ref_pct', Ind:  'ind_pct', Oth: 'oth_pct',
};

// curr object key (matches buildDataFromCSV)
const PARTY_CURR_KEY = {
  Lab: 'Lab', Con: 'Con', LDem: 'LDem',
  Grn: 'Grn', Ref: 'Ref', Ind:  'Ind', Oth: 'Oth',
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}

function buildChoroplethExpression(DATA, partyKey, ceiling) {
  // Build a match expression: ward_code → share value (0–ceiling)
  // Then interpolate: 0 → near-white, ceiling → full party colour
  const party    = PARTIES[partyKey];
  const [r,g,b]  = hexToRgb(party.color);

  // match expression: ward_code → numeric share
  const matchExpr = ['match', ['get', 'ward_code']];
  Object.entries(DATA).forEach(([code, d]) => {
    // curr stores keys like 'Lab', 'Con', 'LD' etc
    // PARTY_CURR_KEY maps our party keys to curr keys
    const currKey = PARTY_CURR_KEY[partyKey] || partyKey;
    const share   = d.curr[currKey] || 0;
    matchExpr.push(code, Math.min(share, ceiling));
  });
  matchExpr.push(0); // fallback

  // interpolate from white to party colour
  return [
    'interpolate', ['linear'],
    matchExpr,
    0,        `rgba(245,245,245,1)`,
    ceiling,  `rgba(${r},${g},${b},1)`,
  ];
}

function initChoropleth(map, DATA) {
  const modeBtns    = document.querySelectorAll('.vc-btn[data-mode]');
  const partyWrap   = document.getElementById('party-select-wrap');
  const partySelect = document.getElementById('party-select');
  const legend      = document.getElementById('choropleth-legend');
  const legendGrad  = document.getElementById('legend-gradient');
  const legendMax   = document.getElementById('legend-max');
  const legendTitle = document.getElementById('legend-title');

  let currentMode  = 'winner';
  let currentParty = 'Lab';

  // Populate party dropdown from PARTIES
  Object.entries(PARTIES).forEach(([key, p]) => {
    const opt = document.createElement('option');
    opt.value       = key;
    opt.textContent = p.label;
    partySelect.appendChild(opt);
  });
  partySelect.value = currentParty;

  // Store the winner expression for reverting
  // We build it fresh from DATA when needed
  function getWinnerExpression() {
    const expr = ['match', ['get', 'ward_code']];
    Object.entries(DATA).forEach(([code, d]) => {
      expr.push(code, PARTIES[d.winner]?.color || '#cccccc');
    });
    expr.push('#cccccc');
    return expr;
  }

  function applyMode(mode, party) {
    currentMode  = mode;
    currentParty = party;

    if (mode === 'winner') {
      map.setPaintProperty('wards-fill', 'fill-color', getWinnerExpression());
      map.setPaintProperty('wards-fill', 'fill-opacity', 0.55);
      // restore hover layer to winner colours too
      map.setPaintProperty('wards-hover', 'fill-color', getWinnerExpression());
      partyWrap.classList.remove('visible');
      legend.classList.remove('visible');
    } else {
      const ceiling = CHOROPLETH_CEILINGS[party] || CHOROPLETH_DEFAULT_CEILING;
      const expr    = buildChoroplethExpression(DATA, party, ceiling);
      map.setPaintProperty('wards-fill',  'fill-color',   expr);
      map.setPaintProperty('wards-fill',  'fill-opacity', 0.85);
      map.setPaintProperty('wards-hover', 'fill-color',   expr);
      partyWrap.classList.add('visible');

      // Update legend
      const p = PARTIES[party];
      legendTitle.textContent = `${p.label} vote share`;
      legendGrad.style.background =
        `linear-gradient(to right, #f5f5f5, ${p.color})`;
      legendMax.textContent = `${ceiling}%+`;
      legend.classList.add('visible');
    }
  }

  // Mode buttons
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyMode(btn.dataset.mode, currentParty);
    });
  });

  // Party selector
  partySelect.addEventListener('change', () => {
    applyMode(currentMode, partySelect.value);
  });
}

// ============================================================
// SEARCH — ward and council name lookup
// ============================================================
function initSearch(DATA, geojsonData, map, isWideFn, showSidePanelFn, showDrawerFn) {
  const input   = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  // Build a lookup: ward_code → { ward_name, council, winner, bounds }
  // Bounds come from the GeoJSON features
  const boundsByCode = {};
  geojsonData.features.forEach(f => {
    const code = f.properties?.ward_code;
    if (!code || !f.geometry) return;
    const coords = f.geometry.type === 'Polygon'
      ? f.geometry.coordinates[0]
      : f.geometry.coordinates.flat(2);
    if (!coords.length) return;
    const lngs = coords.map(c => c[0]);
    const lats  = coords.map(c => c[1]);
    boundsByCode[code] = [
      [lngs.reduce((a,b) => Math.min(a,b)), lats.reduce((a,b) => Math.min(a,b))],
      [lngs.reduce((a,b) => Math.max(a,b)), lats.reduce((a,b) => Math.max(a,b))],
    ];
  });

  // Flat list of searchable entries
  const entries = Object.entries(DATA).map(([code, d]) => ({
    code,
    ward:    d.ward_name  || code,
    council: d.council    || '',
    winner:  d.winner,
    searchStr: (d.ward_name + ' ' + d.council).toLowerCase(),
  }));

  function closeResults() {
    results.classList.remove('open');
    results.innerHTML = '';
  }

  function selectEntry(entry) {
    input.value = entry.ward;
    closeResults();
    const bounds = boundsByCode[entry.code];
    if (bounds && map) {
      map.fitBounds(bounds, { padding: 60, maxZoom: 14, duration: 500 });
    }
    // Open panel or drawer depending on layout
    if (isWideFn()) {
      showSidePanelFn(entry.code, DATA);
    } else {
      showDrawerFn(entry.code, DATA);
    }
  }

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 2) { closeResults(); return; }

    const matches = entries
      .filter(e => e.searchStr.includes(q))
      .slice(0, 8); // cap at 8 results

    if (!matches.length) {
      results.innerHTML = '<div class="search-no-results">No results found</div>';
      results.classList.add('open');
      return;
    }

    results.innerHTML = matches.map(e => {
      const p     = PARTIES[e.winner] || PARTIES.Ind;
      const ward  = e.ward.replace(new RegExp(q, 'gi'), m => `<strong>${m}</strong>`);
      return `<div class="search-result-item" data-code="${e.code}">
        <div class="search-result-dot" style="background:${p.color};"></div>
        <div class="search-result-text">
          <div class="search-result-ward">${ward}</div>
          <div class="search-result-council">${e.council}</div>
        </div>
      </div>`;
    }).join('');

    results.classList.add('open');

    results.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        const code  = el.dataset.code;
        const entry = entries.find(e => e.code === code);
        if (entry) selectEntry(entry);
      });
    });
  });

  // Close on outside click
  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) closeResults();
  });

  // Keyboard: Escape closes, Enter picks first result
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeResults(); input.blur(); }
    if (e.key === 'Enter') {
      const first = results.querySelector('.search-result-item');
      if (first) first.click();
    }
  });
}

// ============================================================
// BOOTSTRAP
// ============================================================
async function bootstrap() {
  let DATA, geojsonData, HISTORY = null;

  try {
    if (GEOJSON_URL) {
      const res = await fetch(GEOJSON_URL);
      geojsonData = await res.json();
    } else if (GEOJSON_INLINE) {
      geojsonData = GEOJSON_INLINE;
    } else {
      geojsonData = buildDemoGeoJSON();
    }
  } catch (err) {
    console.error('GeoJSON load failed:', err);
    geojsonData = buildDemoGeoJSON();
  }

  if (SHEET_CSV_URL) {
    try {
      const res = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      DATA = buildDataFromCSV(parseCSV(text));
    } catch (err) {
      console.warn('CSV load failed, using demo:', err);
      DATA = buildDemoData();
    }
  } else {
    DATA = buildDemoData();
  }

  // Load history CSV if configured
  if (HISTORY_CSV_URL) {
    try {
      const res  = await fetch(HISTORY_CSV_URL);
      const text = await res.text();
      HISTORY = buildHistoryFromCSV(parseCSV(text));
    } catch (err) {
      console.warn('History CSV load failed, history table disabled:', err);
    }
  }

  // Fix 2: remove features with no matching result data
  // This hides Scottish wards, uncontested seats, etc.
  geojsonData = {
    ...geojsonData,
    features: geojsonData.features.filter((f) => {
      const code = f.properties?.ward_code;
      return code && DATA[code];
    }),
  };

  initMap(geojsonData, DATA, HISTORY);
}

bootstrap();

  </script>
